spring.application.name=biddingengine

# PostgreSQL Configuration (from Neon)
spring.datasource.username=${NEON_DATABASE_USERNAME}
spring.datasource.password=${NEON_DATABASE_PASSWORD}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.datasource.url=${NEON_DATABASE_URL:NOT_SET}

# Redis Configuration (from Upstash)
spring.data.redis.url=${REDIS_URL}

# Server Configuration
server.port=${PORT:8080}

